name: Release
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true
jobs:
  release:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            config: .goreleaser.amd64.yaml
          - os: ubuntu-22.04-arm
            config: .goreleaser.arm64.yaml
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev pkg-config libfontconfig1-dev glslang-tools
      # OSS GoReleaser (no Pro split/merge): each native-arch runner builds
      # its own targets and appends them to the tag's GitHub release.
      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean -f ${{ matrix.config }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
